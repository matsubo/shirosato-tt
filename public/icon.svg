<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#0a0e1a"/>
  <!-- Speedometer arc -->
  <path d="M 14 44 A 20 20 0 1 1 50 44" fill="none" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <!-- Active arc segment (showing speed) -->
  <path d="M 14 44 A 20 20 0 1 1 46 28" fill="none" stroke="#22d3ee" stroke-width="4" stroke-linecap="round"/>
  <!-- Needle -->
  <line x1="32" y1="40" x2="44" y2="22" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="40" r="3" fill="#22d3ee"/>
  <!-- TT text -->
  <text x="32" y="58" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold" fill="#22d3ee" letter-spacing="1">TT</text>
</svg>
